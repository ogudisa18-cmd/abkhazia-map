<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дороги Абхазии — Безопасность</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body { margin: 0; font-family: 'Inter', Arial, sans-serif; background: #0a0f1c; }
        .header { position: absolute; top: 0; left: 0; right: 0; background: linear-gradient(135deg, #1a2338, #2a3a5a); color: white; padding: 15px 20px; z-index: 1100; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .map-container { height: 100vh; padding: 72px 12px 12px; background: #0a0f1c; }
        #map { height: 100%; width: 100%; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }

        .fab {
            position: absolute; top: 135px; left: 25px;
            width: 62px; height: 62px;
            background: linear-gradient(145deg, #3b82f6, #1e40af);
            color: white; border: none; border-radius: 50%;
            font-size: 28px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(59,130,246,0.5); z-index: 1100; cursor: pointer;
        }
        .fab:hover { transform: scale(1.12); }

        .fab-menu {
            position: absolute; top: 215px; left: 25px;
            background: rgba(255,255,255,0.97); backdrop-filter: blur(20px);
            border-radius: 18px; padding: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.35);
            z-index: 1090; display: none; flex-direction: column; gap: 8px; min-width: 205px;
        }

        button {
            padding: 13px 18px; border: none; border-radius: 12px;
            cursor: pointer; font-size: 15.5px; font-weight: 600;
        }
        button:hover { transform: translateX(6px); }

        .danger { background: #ffc107; color: #1a1a1a; }
        .police { background: #1e40af; color: white; }
        .dtp { background: #ef4444; color: white; }
        .clear { background: #64748b; color: white; }

        .popup-image { max-width: 100%; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ Дороги Абхазии</h1>
        <p style="font-size:15px; opacity:0.9;">Общая безопасность</p>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>

    <button class="fab" id="fabBtn">📍</button>

    <div class="fab-menu" id="fabMenu">
        <button class="danger" id="btn-danger">⚠ Опасность</button>
        <button class="police" id="btn-police">👮 ГАИ / ДПС</button>
        <button class="dtp" id="btn-dtp">🚑 ДТП</button>
        <button class="clear" id="btn-clear">🗑 Очистить всё</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: true }).setView([43.0, 41.0], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        const abkhaziaBounds = L.latLngBounds([42.45, 40.05], [43.55, 42.05]);

        let markers = [];
        let markersLayer = L.layerGroup().addTo(map);

        function isInAbkhazia(lat, lng) {
            return abkhaziaBounds.contains([lat, lng]);
        }

        function loadMarkers() {
            const saved = localStorage.getItem('abkhaziaMarkers');
            if (saved) {
                markers = JSON.parse(saved);
                markers.forEach(m => createMarker(m.lat, m.lng, m.type, m.desc, m.photo));
            }
        }

        function saveMarkers() {
            localStorage.setItem('abkhaziaMarkers', JSON.stringify(markers));
        }

        function createMarker(lat, lng, type, desc = "", photoBase64 = "") {
            const colors = { danger: '#ffc107', police: '#1e40af', dtp: '#ef4444' };
            const emojis = { danger: '⚠', police: '👮', dtp: '🚑' };

            const icon = L.divIcon({
                html: `<div class="custom-icon ${type}-icon">${emojis[type]}</div>`,
                iconSize: [50, 50],
                iconAnchor: [25, 25]
            });

            const marker = L.marker([lat, lng], { icon }).addTo(markersLayer);

            const photoHTML = photoBase64 ? `<img src="${photoBase64}" class="popup-image">` : '';

            marker.bindPopup(`
                <div style="min-width:280px;">
                    <strong style="color:${colors[type]}; font-size:18px;">${emojis[type]} ${type.toUpperCase()}</strong><br>
                    ${photoHTML}
                    ${desc ? `<p>${desc}</p>` : ''}
                    <small>${new Date().toLocaleString('ru-RU')}</small><br><br>
                    <button onclick="removeThisMarker(${lat.toFixed(6)}, ${lng.toFixed(6)})" 
                            style="width:100%; padding:10px; background:#dc3545; color:white; border:none; border-radius:10px;">
                        🗑 Удалить
                    </button>
                </div>
            `);
        }

        window.removeThisMarker = function(lat, lng) {
            markers = markers.filter(m => Math.abs(m.lat - lat) > 0.0001 || Math.abs(m.lng - lng) > 0.0001);
            refreshAllMarkers();
            saveMarkers();
        };

        function refreshAllMarkers() {
            markersLayer.clearLayers();
            markers.forEach(m => createMarker(m.lat, m.lng, m.type, m.desc, m.photo));
        }

        function addMarkerMode(type) {
            map.off('click');
            map.once('click', (e) => {
                if (!isInAbkhazia(e.latlng.lat, e.latlng.lng)) {
                    alert("❌ Метки можно ставить только на территории Абхазии!");
                    return;
                }

                const desc = prompt('Комментарий к метке:', '') || '';

                // Окно выбора фото
                const photoInput = document.createElement('input');
                photoInput.type = 'file';
                photoInput.accept = 'image/*';

                photoInput.onchange = function(event) {
                    const file = event.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const photoBase64 = e.target.result;
                            saveNewMarker(e.latlng.lat, e.latlng.lng, type, desc, photoBase64);
                        };
                        reader.readAsDataURL(file);
                    } else {
                        saveNewMarker(e.latlng.lat, e.latlng.lng, type, desc, '');
                    }
                };

                photoInput.click();
            });
        }

        function saveNewMarker(lat, lng, type, desc, photoBase64) {
            markers.push({ lat, lng, type, desc, photo: photoBase64 });
            refreshAllMarkers();
            saveMarkers();
        }

        // Кнопки
        document.getElementById('fabBtn').addEventListener('click', () => {
            const menu = document.getElementById('fabMenu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        });

        document.getElementById('btn-danger').addEventListener('click', () => { addMarkerMode('danger'); });
        document.getElementById('btn-police').addEventListener('click', () => { addMarkerMode('police'); });
        document.getElementById('btn-dtp').addEventListener('click', () => { addMarkerMode('dtp'); });
        document.getElementById('btn-clear').addEventListener('click', () => {
            if (confirm('Очистить все метки?')) {
                markers = [];
                markersLayer.clearLayers();
                localStorage.removeItem('abkhaziaMarkers');
            }
        });

        loadMarkers();
    </script>
</body>
</html>
