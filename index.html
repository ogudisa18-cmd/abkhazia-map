<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дороги Абхазии — Безопасность</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0a0f1c; }
        .header { position: absolute; top: 0; left: 0; right: 0; background: linear-gradient(135deg, #1a2338, #2a3a5a); color: white; padding: 15px 20px; z-index: 1100; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .map-container { height: 100vh; padding: 72px 12px 12px; background: #0a0f1c; }
        #map { height: 100%; width: 100%; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }

        .fab { position: absolute; top: 135px; left: 25px; width: 62px; height: 62px; background: linear-gradient(145deg, #3b82f6, #1e40af); color: white; border: none; border-radius: 50%; font-size: 28px; box-shadow: 0 8px 25px rgba(59,130,246,0.5); z-index: 1100; cursor: pointer; }
        .fab:hover { transform: scale(1.12); }

        .fab-menu { position: absolute; top: 215px; left: 25px; background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); border-radius: 18px; padding: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.35); z-index: 1090; display: none; flex-direction: column; gap: 8px; min-width: 205px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ Дороги Абхазии</h1>
        <p style="font-size:15px; opacity:0.9;">Метки видны всем пользователям</p>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>

    <button class="fab" id="fabBtn">📍</button>

    <div class="fab-menu" id="fabMenu">
        <button class="danger" id="btn-danger">⚠ Опасность</button>
        <button class="police" id="btn-police">👮 ГАИ / ДПС</button>
        <button class="dtp" id="btn-dtp">🚑 ДТП</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYXrpvLpCLwPXvcHZJmjoiwGBQ7LEQ_kIGQxjpcv_k-7G94uyW3Qd0lJmULV30eDo6/exec";

        const map = L.map('map', { zoomControl: true }).setView([43.0, 41.0], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        const abkhaziaBounds = L.latLngBounds([42.45, 40.05], [43.55, 42.05]);

        let markersLayer = L.layerGroup().addTo(map);

        async function loadMarkers() {
            markersLayer.clearLayers();
            try {
                const res = await fetch(SCRIPT_URL + "?action=get");
                const markers = await res.json();
                markers.forEach(m => createMarker(m));
            } catch(e) {
                console.log("Ошибка загрузки меток");
            }
        }

        function createMarker(m) {
            const colors = { danger: '#ffc107', police: '#1e40af', dtp: '#ef4444' };
            const emojis = { danger: '⚠', police: '👮', dtp: '🚑' };

            const icon = L.divIcon({
                html: `<div style="background:${colors[m.type]}; width:52px;height:52px;border-radius:50%;border:4px solid white;display:flex;align-items:center;justify-content:center;font-size:28px;">${emojis[m.type]}</div>`,
                iconSize: [52, 52]
            });

            L.marker([m.lat, m.lng], {icon}).addTo(markersLayer)
                .bindPopup(`<strong>${emojis[m.type]} ${m.type.toUpperCase()}</strong><br>${m.desc || ''}`);
        }

        function addMarkerMode(type) {
            map.once('click', async (e) => {
                if (!abkhaziaBounds.contains(e.latlng)) {
                    alert("❌ Метки можно ставить только на территории Абхазии!");
                    return;
                }
                const desc = prompt('Комментарий к метке:', '') || '';

                await fetch(SCRIPT_URL + "?action=add", {
                    method: 'POST',
                    body: JSON.stringify({ lat: e.latlng.lat, lng: e.latlng.lng, type: type, desc: desc })
                });

                loadMarkers();
            });
        }

        // Кнопки
        document.getElementById('fabBtn').addEventListener('click', () => {
            const menu = document.getElementById('fabMenu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        });

        document.getElementById('btn-danger').addEventListener('click', () => addMarkerMode('danger'));
        document.getElementById('btn-police').addEventListener('click', () => addMarkerMode('police'));
        document.getElementById('btn-dtp').addEventListener('click', () => addMarkerMode('dtp'));

        loadMarkers();
    </script>
</body>
</html>
